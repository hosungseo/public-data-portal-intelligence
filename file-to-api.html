<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>File to API Reader</title>
    <style>
      :root {
        --bg: #f4f0e8;
        --bg-deep: #e7ddcf;
        --surface: rgba(255, 250, 244, 0.88);
        --surface-strong: rgba(255, 250, 244, 0.96);
        --line: rgba(30, 39, 48, 0.12);
        --line-strong: rgba(30, 39, 48, 0.24);
        --ink: #18232b;
        --muted: #5d6972;
        --accent: #2a6f6a;
        --accent-soft: rgba(42, 111, 106, 0.12);
        --accent-strong: #144844;
        --shadow: 0 18px 42px rgba(26, 35, 43, 0.08);
        --sans: "Avenir Next", "Pretendard Variable", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        --mono: "SFMono-Regular", "IBM Plex Mono", "Menlo", monospace;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(42, 111, 106, 0.18), transparent 34%),
          radial-gradient(circle at 82% 12%, rgba(195, 126, 51, 0.1), transparent 24%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.18)),
          linear-gradient(135deg, var(--bg) 0%, var(--bg-deep) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(24, 35, 43, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(24, 35, 43, 0.035) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 88%);
      }

      a {
        color: inherit;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 72px;
      }

      .masthead,
      .panel,
      .shortlist-card,
      .strong-card {
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .masthead {
        padding: 24px 24px 20px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .eyebrow::before {
        content: "";
        width: 34px;
        height: 1px;
        background: var(--line-strong);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1,
      h2,
      h3 {
        letter-spacing: -0.02em;
      }

      h1 {
        font-size: clamp(2rem, 3vw, 3rem);
        line-height: 1.04;
      }

      h2 {
        font-size: clamp(1.2rem, 2vw, 1.7rem);
      }

      h3 {
        font-size: 1rem;
      }

      .lede,
      .section-copy,
      .muted {
        color: var(--muted);
        line-height: 1.6;
      }

      .masthead-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(260px, 0.75fr);
        gap: 20px;
        align-items: end;
      }

      .lede {
        margin-top: 12px;
        max-width: 64ch;
      }

      .asset-note {
        padding: 16px 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.5);
      }

      .asset-label {
        display: block;
        margin-bottom: 8px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .asset-value {
        font-family: var(--mono);
        font-size: 0.95rem;
      }

      .metric-grid,
      .shape-grid,
      .provider-grid,
      .shortlist-grid {
        display: grid;
        gap: 14px;
      }

      .priority-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .priority-item {
        display: grid;
        gap: 4px;
      }

      .priority-label {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .priority-value {
        font-family: var(--mono);
        font-size: 1rem;
        color: var(--ink);
      }

      .priority-note {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 20px;
      }

      .metric-card {
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .metric-label {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .metric-value {
        margin-top: 8px;
        font-family: var(--mono);
        font-size: clamp(1.2rem, 2vw, 1.62rem);
      }

      .metric-note {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .section {
        margin-top: 18px;
      }

      .section-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.98fr) minmax(0, 1.02fr);
        gap: 16px;
      }

      .panel {
        padding: 18px;
      }

      .panel-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-copy {
        max-width: 56ch;
      }

      .bar-row {
        display: grid;
        gap: 8px;
      }

      .bar-row + .bar-row,
      .provider-row + .provider-row,
      .strong-card + .strong-card {
        margin-top: 14px;
      }

      .bar-meta,
      .provider-topline,
      .detail-topline {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .bar-label,
      .provider-name,
      .lane,
      .token {
        font-size: 0.9rem;
      }

      .bar-value,
      .provider-metric,
      .token,
      .mini {
        font-family: var(--mono);
      }

      .bar-track {
        height: 8px;
        border-radius: 999px;
        background: rgba(24, 35, 43, 0.08);
        overflow: hidden;
      }

      .bar-track span {
        display: block;
        width: calc(var(--share, 0) * 100%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #73a79f);
        transition: width 500ms ease;
      }

      .chip-row,
      .meta-row,
      .reason-list,
      .provider-examples,
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip,
      .tag,
      .lane {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
      }

      .lane {
        color: var(--accent-strong);
        background: rgba(42, 111, 106, 0.1);
        border-color: rgba(42, 111, 106, 0.18);
      }

      .lane--metadata-ready {
        background: rgba(42, 111, 106, 0.12);
        border-color: rgba(42, 111, 106, 0.26);
      }

      .lane--cross-channel-demand {
        background: rgba(69, 98, 148, 0.1);
        border-color: rgba(69, 98, 148, 0.22);
        color: #27486f;
      }

      .lane--usage-gap-check {
        background: rgba(143, 109, 44, 0.12);
        border-color: rgba(143, 109, 44, 0.22);
        color: #7a5620;
      }

      .provider-row {
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .provider-row:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .provider-meta {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .mini-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .mini-value {
        margin-top: 4px;
        font-family: var(--mono);
        font-size: 0.96rem;
      }

      .provider-examples {
        margin-top: 10px;
      }

      .example-pill {
        padding: 8px 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.58);
      }

      .shortlist-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .shortlist-card,
      .strong-card {
        padding: 18px;
      }

      .action-note {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .action-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .action-copy {
        margin-top: 4px;
        color: var(--ink);
        line-height: 1.5;
      }

      .card-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .rank {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: rgba(24, 35, 43, 0.08);
        font-family: var(--mono);
        font-size: 0.92rem;
      }

      .title {
        margin-top: 8px;
        font-size: 1.08rem;
        line-height: 1.35;
      }

      .provider {
        margin-top: 4px;
        color: var(--muted);
      }

      .meta-row,
      .reason-list,
      .tag-row {
        margin-top: 12px;
      }

      .meta-item {
        min-width: 104px;
      }

      .meta-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .meta-value {
        margin-top: 4px;
        font-family: var(--mono);
      }

      .reason-list {
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      .reason-list li + li {
        margin-top: 6px;
      }

      details {
        cursor: pointer;
      }

      details summary {
        list-style: none;
      }

      details summary::-webkit-details-marker {
        display: none;
      }

      .strong-card {
        background: var(--surface-strong);
      }

      .strong-summary {
        display: grid;
        gap: 10px;
      }

      .summary-copy {
        color: var(--muted);
        line-height: 1.5;
      }

      .detail-body {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .show-more {
        margin-top: 16px;
        padding: 10px 14px;
        border: 1px solid var(--line-strong);
        background: rgba(255, 255, 255, 0.66);
        color: var(--ink);
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background-color 140ms ease;
      }

      .show-more:hover,
      .show-more:focus-visible {
        transform: translateY(-1px);
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.9);
      }

      .empty {
        padding: 18px;
        border: 1px dashed var(--line-strong);
        color: var(--muted);
      }

      [data-reveal] {
        opacity: 0;
        transform: translateY(14px);
        transition: opacity 320ms ease, transform 320ms ease;
      }

      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .masthead-grid,
        .section-grid,
        .shortlist-grid,
        .priority-strip {
          grid-template-columns: 1fr;
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .app {
          width: min(100vw - 20px, 1120px);
          padding-top: 20px;
        }

        .masthead,
        .panel,
        .shortlist-card,
        .strong-card {
          padding: 16px;
        }

        .metric-grid {
          grid-template-columns: 1fr;
        }

        .provider-meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="masthead" data-reveal>
        <div class="eyebrow">Public Data Portal Intelligence</div>
        <div class="masthead-grid">
          <div>
            <h1>File-to-API candidates</h1>
            <p class="lede" id="hero-lede"></p>
          </div>
          <div class="asset-note">
            <span class="asset-label">Asset</span>
            <span class="asset-value" id="asset-note"></span>
          </div>
        </div>
        <div class="metric-grid" id="hero-metrics"></div>
        <div class="priority-strip" id="priority-strip"></div>
      </section>

      <section class="section">
        <div class="panel" data-reveal>
          <div class="panel-head">
            <div>
              <h2>Inspect first</h2>
              <p class="section-copy" id="shortlist-copy"></p>
            </div>
          </div>
          <div class="shortlist-grid" id="shortlist-grid"></div>
        </div>
      </section>

      <section class="section section-grid">
        <div class="panel" data-reveal>
          <div class="panel-head">
            <div>
              <h2>Slice shape</h2>
              <p class="section-copy">This is the current shape of the file-to-API queue, not the whole merged catalog.</p>
            </div>
          </div>
          <div class="metric-grid" id="readiness-metrics"></div>
          <div class="section" id="source-combo-bars"></div>
          <div class="section">
            <h3>Top formats</h3>
            <div class="chip-row" id="format-chips"></div>
          </div>
          <div class="section">
            <h3>Update cycles</h3>
            <div class="chip-row" id="update-chips"></div>
          </div>
        </div>

        <div class="panel" data-reveal>
          <div class="panel-head">
            <div>
              <h2>Top providers</h2>
              <p class="section-copy" id="provider-copy"></p>
            </div>
          </div>
          <div id="provider-list"></div>
        </div>
      </section>

      <section class="section">
        <div class="panel" data-reveal>
          <div class="panel-head">
            <div>
              <h2>Strongest candidates</h2>
              <p class="section-copy" id="strongest-copy"></p>
            </div>
          </div>
          <div id="strongest-list"></div>
          <button class="show-more" id="show-more" type="button">Show 12 more</button>
        </div>
      </section>
    </main>

    <script src="output/file_to_api_summary.js"></script>
    <script src="file-to-api.js"></script>
  </body>
</html>
